version: 2

models:
  - name: missing_domains_df
    description: Output domains which are not being categorized using the anti join between the site visit signal table and the domain to vertical mapping
    config:
      submission_method: job_cluster
      packages:
        - tldextract==5.3.0
        - cloudpickle>=3.1.1
        - scikit-learn>=1.6.1
        - mlflow>=2.22.0
      job_cluster_config:
        spark_version: 16.4.x-scala2.12
        node_type_id: c5d.4xlarge
        autoscale:
          min_workers: 5
          max_workers: 40
        aws_attributes:
          first_on_demand: 1
          instance_profile_arn: "{{var('aws_cluster_instance_profile_arn')}}"
        spark_conf:
          spark.dynamicAllocation.shuffleTracking.enabled: true
          spark.dynamicAllocation.enabled: true
          spark.sql.shuffle.partitions: auto
        custom_tags:
          Squad: MLSQUAD
          Env: "{{ target.name.replace('-','_').split('_')[0] | upper }}"
          project: vertical_categorization